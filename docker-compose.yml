services:
  mongo:
    image: mongo:7
    container_name: agri-trace-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  blockchain:
    build:
      context: ./Source code/blockchain
    container_name: agri-trace-blockchain
    restart: unless-stopped
    ports:
      - "8545:8545"
    volumes:
      - contract-data:/shared
    healthcheck:
      test: ["CMD-SHELL", "test -f /shared/contract.env"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  api:
    build:
      context: ./Source code/api
    container_name: agri-trace-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      blockchain:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_URI: mongodb://mongo:27017/agri-trace
      JWT_SECRET: dev-secret-change-me
      JWT_LIFETIME: 7d
      BLOCKCHAIN_RPC_URL: http://blockchain:8545
      BLOCKCHAIN_PRIVATE_KEY: 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      FRONTEND_URL: http://localhost:3000
      CONTRACT_FILE: /shared/contract.env
    ports:
      - "5000:5000"
    volumes:
      - contract-data:/shared:ro

  web:
    build:
      context: ./Source code/web
      args:
        REACT_APP_API_URL: /api/v1
    container_name: agri-trace-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  mongo-data:
  contract-data:
